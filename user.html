<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<meta name="viewport"
		content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<link rel="stylesheet" href="iconfont/iconfont.css">
	<link rel="stylesheet" href="css/normalize.css">
	<link rel="stylesheet" href="css/user.css">
	<title>LuckySHOP我的</title>
</head>

<body>
	
	<div class="top">
		<div class="more">
			<h2>我的LuckySHOP</h2>
			<span class="iconfont icon-qita1"></span>
		</div>
		<!-- 我的信息+会员码 -->
		<div class="myInfo">
			<!-- 头像 -->
			<div class="toxiang">
				<img src="img/touxiang/5.jpg" alt="" id="userTouxiang">
			</div>
			<!-- 信息 -->
			<div class="info">
				<div class="name" id="userName">老黄超级无敌大帅哥</div>
				<div class="vipGrade" id="vipGrade">LV.10</div>
			</div>
			<!-- 会员码 -->
			<div class="vipCode">
				<span class="iconfont icon-erweima"></span>
				<div>会员码</div>
			</div>
		</div>
		
		<div class="myData">
			<div class="card">
				<div id="youhuiNum"></div>
				<div>优惠券</div>
			</div>
			<div class="card">
				<div id="jifenNum"></div>
				<div>积分</div>
			</div>
			<div class="card">
				<div id="zujiNum"></div>
				<div>足迹</div>
			</div>
			<div class="card">
				<div id="focusNum"></div>
				<div>我的关注</div>
			</div>
		</div>
	</div>
	<!-- 下：内容 -->
	<div class="bottom">
		<!-- 我的订单 -->
		<div class="myOrder">
			<div class="orderTitle">
				<div>我的订单</div>
				<div>
					全部订单
					<svg class="icon" aria-hidden="true">
						<use xlink:href="#icon-youjiantou"></use>
					</svg>
				</div>
			</div>
			<div class="order">
				<div class="card">
					<span class="iconfont icon-daifukuan"></span>
					<span>待付款</span>
				</div>
				<div class="card">
					<span class="iconfont icon-a-ziyuan6"></span>
					<span>待发货</span>
				</div><div class="card">
					<span class="iconfont icon-a-ziyuan7"></span>
					<span>待收货</span>
				</div><div class="card">
					<span class="iconfont icon-a-ziyuan8"></span>
					<span>已签收</span>
				</div>
			</div>
		</div>
		<!-- 必备工具 -->
		<div class="mytool">
			<div class="toolTitle">
				<div>必备工具</div>
			</div>
			<div class="tool">
				<div class="card">
					<span class="iconfont icon-hongbao"></span>
					<span>我的红包</span>
				</div>
				<div class="card">
					<span class="iconfont icon-shangdian1"></span>
					<span>我的店铺</span>
				</div>
				<div class="card">
					<span class="iconfont icon-yuyue"></span>
					<span>我的预约</span>
				</div>
				<div class="card">
					<span class="iconfont icon-kefu"></span>
					<span>客户服务</span>
				</div>
				<div class="card">
					<span class="iconfont icon-zhekou"></span>
					<span>折扣</span>
				</div>
				<div class="card">
					<span class="iconfont icon-tuangou"></span>
					<span>团购</span>
				</div>
				<div class="card">
					<span class="iconfont icon-vip-fill"></span>
					<span>我的VIP</span>
				</div>
				<div class="card">
					<span class="iconfont icon-shoujichongzhi"></span>
					<span>手机充值</span>
				</div>
			</div>
		</div>
	</div>	
	<!-- 底部导航栏 -->
	<footer>
		<ul>
			<li><a href="index.html"><i class="iconfont icon-a-ziyuan26"></i><span>主页</span></a></li>
			<li><a href="shopping_cart.html"><i class="iconfont icon-fenlei"></i><span>分类</span></a></li>
			<li><a href="category.html"><i class="iconfont icon-a-ziyuan32"></i><span>购物车</span></a></li>
			<li><a href="user.html"><i class="iconfont icon-a-ziyuan1"></i><span>我的</span></a></li>
		</ul>
	</footer>
	
	<script src="json/user.json" ></script>
	<script src="js/axios-0.18.0.js" ></script>
	<script src="iconfont/iconfont.js"></script>
	<script src="js/user.js"></script>
</body>

</html>
