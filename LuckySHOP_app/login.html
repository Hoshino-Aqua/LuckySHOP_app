<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<meta name="viewport"
		content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<link rel="stylesheet" href="iconfont/iconfont.css">
	<link rel="stylesheet" href="css/normalize.css">
	<link rel="stylesheet" href="css/login.css">
	<title>LuckySHO登录</title>
</head>

<body>
	<!-- 顶部返回首页 -->
	<header>
		<a href="index.html"><i class="iconfont icon-fanhui"></i></a>
	</header>
	
	<!-- 欢迎 -->
	<div class="banner">
		<!-- logo -->
		<svg class="icon logo" aria-hidden="true">
			<use xlink:href="#icon-qianbi"></use>
		</svg>
		<!-- 文字 -->
		<h2>欢迎登陆LuckySHOP</h2>
	</div>
	<!--登陆表单-->
	<div id="loginForm1">
		<form action="#" id="loginFormTel">
			<input type="text" placeholder="请输入手机号" id="loginTel">
			<input type="text" placeholder="请输入验证码" id="loginTelCode">
			<button type="button" id="loginGetCode">获取验证码</button>
			<div id="agree"><input type="radio" id="agreeRadio">我同意<a href="#">《LuckySHOP会员章程》</a></div>
			<button type="submit" id="loginBtn1">登录</button>
			<div id="tologinForm2">账号密码登录</div>
		</form>
	</div>
	<!-- 账号密码登录 -->
	<div id="loginForm2">
		<form action="#" id="loginFormPwd">
			<input type="text" placeholder="请输入手机号" id="loginUser">
			<input type="password" placeholder="请输入密码" id="loginPassword">
			<button type="submit" id="loginBtn2">登录</button>
			<div id="tologinForm1">手机号登录</div>
		</form>
	</div>
	<!-- 弹窗成功 -->
	<div id="loginSuccess" class="loginAlert">
		<svg class="icon" aria-hidden="true">
			<use xlink:href="#icon-chenggong"></use>
		</svg>
	</div>
	<!-- 弹窗失败 -->
	<div id="loginFail" class="loginAlert">
		<svg class="icon" aria-hidden="true">
			<use xlink:href="#icon-shibai"></use>
		</svg>
	</div>
	<!-- 阅读会员章程 -->
	<div id="loginRead" class="loginAlert">
		<h2>请阅读并同意<br>会员章程！</h2>
	</div>
	
	<!-- 底部导航栏 -->
	<footer>
		<ul>
			<li><a href="index.html"><i class="iconfont icon-a-ziyuan26"></i><span>主页</span></a></li>
			<li><a href="shopping_cart.html"><i class="iconfont icon-fenlei"></i><span>分类</span></a></li>
			<li><a href="login_navigation.html"><i class="iconfont icon-a-ziyuan32"></i><span>购物车</span></a></li>
			<li id="my"><a href="#"><i class="iconfont icon-a-ziyuan1"></i><span>我的</span></a></li>
		</ul>
	</footer>

	
	<script src="json/user.json"></script>
	<script src="js/axios-0.18.0.js"></script>
	<script src="iconfont/iconfont.js"></script>
	<script src="js/login.js"></script>
</body>

</html>
